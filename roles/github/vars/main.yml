  - name: "chezmoi"
    description: "Manage your dotfiles across multiple diverse machines, securely."
    repo: "twpayne/chezmoi"
    version: 2.70.2
    binary_name: "chezmoi"
    binary_pattern: "chezmoi___VERSION___linux-musl_amd64.tar.gz"

  - name: "mise"
    description: "dev tools, env vars, task runner"
    repo: "jdx/mise"
    version: 2026.4.25
    binary_name: "mise"
    binary_pattern: "mise-v__VERSION__-linux-x64-musl.tar.gz"

  - name: "carapace"
    description: "A multi-shell completion binary"
    repo: "carapace-sh/carapace-bin"
    version: 1.6.4
    binary_name: "carapace"
    binary_pattern: "carapace-bin___VERSION___linux_amd64.tar.gz"

  - name: "atuin"
    description: "✨ Making your shell magical"
    repo: "atuinsh/atuin"
    version: 18.16.0
    binary_name: "atuin"
    binary_pattern: "atuin-x86_64-unknown-linux-musl.tar.gz"

  - name: "zoxide"
    description: "A smarter cd command. Supports all major shells."
    repo: "ajeetdsouza/zoxide"
    version: 0.9.9
    binary_name: "zoxide"
    binary_pattern: "zoxide-0.9.9-x86_64-unknown-linux-musl.tar.gz"

  - name: "starship"
    description: "☄🌌️ The minimal, blazing-fast, and infinitely customizable prompt for any shell!"
    repo: "starship/starship"
    version: 1.25.0
    binary_name: "starship"
    binary_pattern: "starship-x86_64-unknown-linux-musl.tar.gz"

  - name: "yazi"
    description: "A terminal file viewer"
    repo: "sxyazi/yazi"
    version: 26.1.22
    binary_name: "yazi"
    binary_pattern: "yazi-x86_64-unknown-linux-musl.zip"

  - name: "zellij"
    description: "A terminal workspace with batteries included"
    repo: "zellij-org/zellij"
    version: 0.44.2
    binary_name: "zellij"
    binary_pattern: "zellij-x86_64-unknown-linux-musl.tar.gz"

  - name: "bat"
    description: "A cat(1) clone with wings."
    repo: "sharkdp/bat"
    version: 0.26.1
    binary_name: "bat"
    binary_pattern: "bat-v__VERSION__-x86_64-unknown-linux-musl.tar.gz"

  - name: "bat"
    description: "A cat(1) clone with wings."
    repo: "sharkdp/bat"
    version: 0.26.1
    binary_name: "bat"
    binary_pattern: "bat-v__VERSION__-x86_64-unknown-linux-musl.tar.gz"

  - name: "fd"
    description: "A simple, fast and user-friendly alternative to 'find'"
    repo: "sharkdp/fd"
    version: 10.4.2
    binary_name: "fd"
    binary_pattern: "fd-v__VERSION__-x86_64-unknown-linux-musl.tar.gz"

  - name: "fzf"
    description: "🌸 A command-line fuzzy finder"
    repo: "junegunn/fzf"
    version: 0.72.0
    binary_name: "fzf"
    binary_pattern: "fzf-__VERSION__-linux_amd64.tar.gz"

  - name: "eza"
    description: "A modern alternative to ls"
    repo: "eza-community/eza"
    version: 0.23.4
    binary_name: "eza"
    binary_pattern: "eza_x86_64-unknown-linux-musl.tar.gz"

  - name: "ripgrep"
    description: "A fast grep replacement"
    repo: "BurntSushi/ripgrep"
    version: 15.1.0
    tag_prefix: ""
    binary_name: "rg"
    binary_pattern: "ripgrep-__VERSION__-x86_64-unknown-linux-musl.tar.gz"

  - name: "dust"
    description: "A more intuitive version of du in rust"
    repo: "bootandy/dust"
    version: 1.2.4
    binary_name: "dust"
    binary_pattern: "dust-v__VERSION__-x86_64-unknown-linux-musl.tar.gz"

  - name: "jq"
    description: "Command-line JSON processor"
    repo: "jqlang/jq"
    version: 1.8.1
    tag_prefix: "jq-"
    binary_name: "jq"
    binary_pattern: "jq-linux-amd64"

  - name: "yq"
    description: "yq is a portable command-line YAML, JSON, XML, CSV, TOML, HCL and properties processor"
    repo: "mikefarah/yq"
    version: 4.53.2
    binary_name: "yq"
    binary_pattern: "yq_linux_amd64"

  - name: "direnv"
    description: "unclutter your .profile"
    repo: "direnv/direnv"
    version: 2.37.1
    binary_name: "direnv"
    binary_pattern: "direnv.linux-amd64"

  - name: "uv"
    description: "An extremely fast Python package installer and resolver, written in Rust."
    repo: "astral-sh/uv"
    version: 0.11.8
    tag_prefix: ""
    binary_name: "uv"
    binary_pattern: "uv-x86_64-unknown-linux-musl.tar.gz"

  - name: "sheldon"
    description: ":bowtie: Fast, configurable, shell plugin manager"
    repo: "rossmacarthur/sheldon"
    version: 0.8.5
    tag_prefix: ""
    binary_name: "sheldon"
    binary_pattern: "sheldon-__VERSION__-x86_64-unknown-linux-musl.tar.gz"
